<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClassicWords - Samples</title>
    <style>
        @font-face {
            font-family: 'Huiwen Mincho';
            src: url('Huiwenmincho-improved.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: fallback;
        }

        @font-face {
            font-family: 'Special Elite';
            src: url('specialelite-webfont.woff2') format('woff2');
            font-weight: 400;
            font-style: 400;
            font-display: fallback;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #f8f8f8;
        }

        html {
            background: #f8f8f8;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 80px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo svg {
            width: 36px;
            height: 36px;
        }

        .logo-text {
            font-family: 'Special Elite', serif;
            font-size: 14pt;
            color: #333;
            letter-spacing: 1px;
        }

        .color-switch {
            display: flex;
            gap: 8px;
        }

        .action-block {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border: 2px solid #999;
            border-radius: 4px;
            background: transparent;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .action-btn:hover {
            transform: scale(1.05);
            border-color: #666;
        }

        .action-btn svg {
            width: 16px;
            height: 16px;
        }

        .color-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #999;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .color-btn:hover {
            transform: scale(1.1);
        }

        .color-btn.active {
            border-color: #333;
        }

        .color-btn.gray {
            background: #f0ebe0;
        }

        .color-btn.white {
            background: #f8f8f8;
        }

        .samples-list {
            padding: 24px 80px 40px;
            font-family: 'Special Elite', 'Huiwen Mincho', serif;
            font-size: 12pt;
            line-height: 28px;
            letter-spacing: 2px;
            color: #333;
            min-height: calc(100vh - 168px);
        }

        .samples-list h2 {
            font-family: 'Special Elite', serif;
            font-size: 18pt;
            font-weight: normal;
            color: #333;
            margin: 0 0 32px 0;
            letter-spacing: 2px;
        }

        .sample-item {
            margin-bottom: 24px;
        }

        .sample-item a {
            font-family: 'Special Elite', serif;
            font-size: 14pt;
            color: #333;
            text-decoration: none;
            letter-spacing: 1px;
            transition: color 0.2s;
        }

        .sample-item a:hover {
            color: #666;
        }

        .sample-item span {
            display: block;
            font-size: 10pt;
            color: #999;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .footer {
            text-align: center;
            padding: 16px 80px;
            font-family: 'Special Elite', serif;
            font-size: 10pt;
            color: #666;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .top-bar {
                padding: 16px 24px;
            }

            .samples-list {
                padding: 20px 24px 32px;
                font-size: 14pt;
                line-height: 32px;
            }

            .footer {
                padding: 16px 24px;
            }
        }

    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo" onclick="location.href='index.html'">
            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="8" y="24" width="48" height="28" rx="3" stroke="#333" stroke-width="2.5" fill="none"/>
                <rect x="18" y="8" width="28" height="20" stroke="#333" stroke-width="2" fill="none"/>
                <line x1="22" y1="14" x2="42" y2="14" stroke="#333" stroke-width="1.5"/>
                <line x1="22" y1="18" x2="38" y2="18" stroke="#333" stroke-width="1.5"/>
                <line x1="22" y1="22" x2="40" y2="22" stroke="#333" stroke-width="1.5"/>
                <rect x="12" y="36" width="40" height="12" rx="2" stroke="#333" stroke-width="2" fill="none"/>
                <circle cx="20" cy="42" r="2.5" fill="#333"/>
                <circle cx="28" cy="42" r="2.5" fill="#333"/>
                <circle cx="36" cy="42" r="2.5" fill="#333"/>
                <circle cx="44" cy="42" r="2.5" fill="#333"/>
                <rect x="6" y="20" width="52" height="4" rx="1" stroke="#333" stroke-width="2" fill="none"/>
                <circle cx="4" cy="22" r="3" stroke="#333" stroke-width="2" fill="none"/>
                <circle cx="60" cy="22" r="3" stroke="#333" stroke-width="2" fill="none"/>
            </svg>
            <span class="logo-text">ClassicWords</span>
        </div>

        <div class="action-block">
            <div class="color-switch">
                <button class="color-btn white active" id="btnWhite" title="White paper"></button>
                <button class="color-btn gray" id="btnGray" title="Paper texture"></button>
            </div>
            <div class="action-btn" id="btnEditor" title="Editor">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                </svg>
            </div>
        </div>
    </div>

    <div class="samples-list">
        <div class="sample-item">
            <a href="sample_frank_underwoods_letter_to_president_walker.html">Frank Underwood's letter to President Walker</a>
        </div>
        <div class="sample-item">
            <a href="sample_dear_ dolores_letter_green_book.html">Dear Dolores letter from Green Book</a>
        </div>
    </div>

    <div class="footer">@Build with Claude Code & Minimax</div>

    <script>
        const btnGray = document.getElementById('btnGray');
        const btnWhite = document.getElementById('btnWhite');

        btnGray.addEventListener('click', () => {
            document.body.style.background = '#f0ebe0';
            document.documentElement.style.background = '#f0ebe0';
            btnGray.classList.add('active');
            btnWhite.classList.remove('active');
        });

        btnWhite.addEventListener('click', () => {
            document.body.style.background = '#f8f8f8';
            document.documentElement.style.background = '#f8f8f8';
            btnWhite.classList.add('active');
            btnGray.classList.remove('active');
        });

        const btnEditor = document.getElementById('btnEditor');
        btnEditor.addEventListener('click', () => {
            location.href = 'index.html';
        });
    </script>
</body>
</html>
